name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sanidade:
    name: Sanidade (compile + collect)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compilar (syntax) scripts, pages e tests
        run: python -m compileall -q scripts pages tests conftest.py

      - name: Coletar a suíte (valida imports, markers, POM)
        # --collect-only não abre navegador nem acessa o stage; só importa os módulos.
        run: python -m pytest --collect-only -q

  # NOTA: os testes E2E (tests/marca_dagua, tests/recertificacao) rodam contra o
  # stage Twygo e exigem credenciais + navegador. NÃO rodam no CI por padrão (sem
  # segredos, e o stage é compartilhado/mutável). Para rodar localmente:
  #   .\.venv\Scripts\python.exe -m pytest --headed --slowmo 500
  # Para habilitar no CI: configurar os secrets do .env e adicionar um job com
  #   `playwright install --with-deps chromium` + `pytest -m "not skip"`.
