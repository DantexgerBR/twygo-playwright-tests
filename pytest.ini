[pytest]
testpaths = tests
# tests/app/ testa o app Flet CANCELADO (depende de libs removidas do requirements) — ignorado.
addopts = --browser chromium --tracing retain-on-failure --screenshot only-on-failure --ignore=tests/app
# Default headless (CI-friendly). Para debug visual: pytest --headed --slowmo 500 --video on
markers =
    admin: testes que rodam logados como administrador
    aluno: testes que rodam logados como aluno
    marca_dagua: testes da feature de marca d'água
    mobile: testes de viewport/comportamento mobile
    recertificacao: testes E2E dos cards de recertificação (stage; pulam sem credencial)
    reinscricao: testes da feature de reinscrição/recertificação
