<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #0a0c0f;
      --panel: #10151b;
      --line: #1d2530;
      --ink: #e8eef5;
      --mut: #69768a;
      --acc: #b6ff3c;
      --acc-dim: rgba(182, 255, 60, 0.12);
      --ok: #b6ff3c;
      --mono: "Cascadia Code", "JetBrains Mono", "SF Mono", ui-monospace, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--mono);
      color: var(--ink);
      background: var(--bg);
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 26px 26px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(80% 60% at 50% 0%, var(--acc-dim), transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 480px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,0.8);
      opacity: 0;
      animation: rise 0.55s ease forwards;
    }
    /* Cantos de mira decorativos. */
    .card::before, .card::after {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      border: 2px solid var(--acc);
      opacity: 0.6;
    }
    .card::before { top: 12px; left: 12px; border-right: 0; border-bottom: 0; }
    .card::after  { bottom: 12px; right: 12px; border-left: 0; border-top: 0; }

    .head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .mira { width: 30px; height: 30px; color: var(--acc); filter: drop-shadow(0 0 8px var(--acc-dim)); }
    h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin: 0;
    }
    .lead {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--mut);
      line-height: 1.6;
      margin: 0 0 26px 42px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 20px 0 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mut);
    }
    label .opt { color: var(--line); font-weight: 400; letter-spacing: 0.1em; }
    label::before { content: ""; width: 6px; height: 6px; background: var(--acc); border-radius: 1px; }

    input {
      width: 100%;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input::placeholder { color: #3a4756; }
    input:focus {
      outline: none;
      border-color: var(--acc);
      box-shadow: 0 0 0 3px var(--acc-dim);
    }

    .ajuda {
      margin: 18px 0 0;
      padding: 12px 14px;
      font-size: 11px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      color: var(--mut);
      background: var(--bg);
      border: 1px solid var(--line);
      border-left: 3px solid var(--acc);
      border-radius: 8px;
    }
    .ajuda strong { color: var(--ink); font-weight: 700; }
    .ajuda em { color: var(--acc); font-style: normal; }

    .acoes { display: flex; align-items: center; gap: 14px; margin-top: 26px; }
    #salvar {
      padding: 12px 26px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--acc);
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 22px -8px var(--acc);
    }
    #salvar:hover { transform: translateY(-1px); box-shadow: 0 10px 30px -8px var(--acc); }
    #salvar:active { transform: translateY(1px); }
    .ok {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ok);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="head">
      <svg class="mira" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <circle cx="12" cy="12" r="7" opacity="0.5"></circle>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
        <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"></circle>
      </svg>
      <h1>Configurações</h1>
    </div>
    <p class="lead">Print Evidências envia suas capturas para o Cloudinary e devolve o link público.</p>

    <label for="cloudName">Cloud name</label>
    <input id="cloudName" type="text" placeholder="ex: djkkooprl" autocomplete="off" spellcheck="false" />

    <label for="uploadPreset">Upload preset <span class="opt">· unsigned</span></label>
    <input id="uploadPreset" type="text" placeholder="ex: twygo_evidencias" autocomplete="off" spellcheck="false" />

    <label for="pasta">Pasta <span class="opt">· opcional</span></label>
    <input id="pasta" type="text" placeholder="ex: twygo-evidencias" autocomplete="off" spellcheck="false" />

    <p class="ajuda">
      No Cloudinary: <strong>Settings → Upload → Upload presets → Add upload preset</strong>,
      defina <em>Signing Mode</em> como <strong>Unsigned</strong> e cole aqui o nome do preset.
      O <strong>Cloud name</strong> está no Dashboard.
    </p>

    <div class="acoes">
      <button id="salvar">Salvar</button>
      <span id="status" class="ok"></span>
    </div>
  </main>

  <script src="options.js"></script>
</body>
</html>
